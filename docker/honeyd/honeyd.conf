# Minimal honeyd config for the AI Honeypot Detection lab.
# Simulates a generic Linux host with a handful of commonly-scanned open
# ports, so it produces a plausible "honeypot" feature profile (banner
# text, TTL, and timing characteristics differ subtly from a real host)
# without needing full multi-IP virtual topology.

create default
set default personality "Linux 2.6.18"
set default default tcp action reset
set default default udp action reset
set default default icmp action open

add default tcp port 21 "/bin/sh -c 'echo 220 ProFTPD 1.3.5 Server ready.'"
add default tcp port 22 "/bin/sh -c 'echo SSH-2.0-OpenSSH_6.6.1'"
add default tcp port 23 "/bin/sh -c 'echo login:'"
add default tcp port 80 open

set default uptime 3284421
